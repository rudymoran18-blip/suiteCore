<div class="sidebar d-flex flex-column flex-shrink-0 p-4 text-white sidebar-mobile-hidden"
     [ngClass]="{ 'show-sidebar': isSidebarOpen }">

  <div class="d-flex align-items-center justify-content-between mb-5">
    <a href="/" class="d-flex align-items-center text-white text-decoration-none">
      <i class="fas fa-hotel me-3 fs-4 text-emerald-light"></i>
      <span class="fs-4 fw-bold tracking-wide">SuiteCore</span>
    </a>

    <button (click)="onCloseMenu()" class="btn btn-close-sidebar d-lg-none" type="button" title="Cerrar Menú">
      <i class="fas fa-times fs-4"></i>
    </button>
  </div>

  <hr class="my-2 opacity-20">

  <ul class="nav nav-pills flex-column mb-auto gap-2">
    <li class="nav-item">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-3 px-3 py-2.5 rounded-3">
        <i class="fas fa-chart-pie sidebar-icon"></i>
        <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a routerLink="/hoteles" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-3 px-3 py-2.5 rounded-3">
        <i class="fas fa-building sidebar-icon"></i>
        <span>Hoteles</span>
      </a>
    </li>
    <li>
      <a routerLink="/habitaciones" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-3 px-3 py-2.5 rounded-3">
        <i class="fas fa-door-closed sidebar-icon"></i>
        <span>Habitaciones</span>
      </a>
    </li>
  </ul>

  <hr class="opacity-20 my-3">

  <div class="sidebar-user-footer d-flex align-items-center gap-3">
    <div class="avatar-placeholder d-flex align-items-center justify-content-center fw-bold shadow-sm">
      RM
    </div>
    <div class="user-meta text-truncate">
      <h6 class="mb-0 text-sm fw-semibold text-white text-truncate">Rudy Morán</h6>
      <span class="text-xs opacity-60">Administrador</span>
    </div>
  </div>

</div>
